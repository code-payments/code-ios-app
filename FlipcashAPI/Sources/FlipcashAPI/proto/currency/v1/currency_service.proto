syntax = "proto3";

package ocp.currency.v1;

option go_package = "github.com/code-payments/ocp-protobuf-api/generated/go/currency/v1;currency";
option java_package = "com.codeinc.gen.currency.v1";
option objc_class_prefix = "CPBCurrencyV1";

import "common/v1/model.proto";
import "validate/validate.proto";
import "google/protobuf/timestamp.proto";

service Currency {
    // GetMints gets mint account metadata by address
    rpc GetMints(GetMintsRequest) returns (GetMintsResponse);

    // GetHistoricalMintData returns historical market data for a mint
    rpc GetHistoricalMintData(GetHistoricalMintDataRequest) returns (GetHistoricalMintDataResponse);

    // StreamLiveMintData streams live mint data for a set of mints
    rpc StreamLiveMintData(stream StreamLiveMintDataRequest) returns (stream StreamLiveMintDataResponse);

    // Launch launches a new currency on the launchpad
    rpc Launch(LaunchRequest) returns (LaunchResponse);

    // UpdateIcon uploads and updates the icon for a currency
    rpc UpdateIcon(UpdateIconRequest) returns (UpdateIconResponse);

    // UpdateMetadata updates mutable metadata for a currency
    rpc UpdateMetadata(UpdateMetadataRequest) returns (UpdateMetadataResponse);

    // Discover returns a set of currencies to discover
    rpc Discover(DiscoverRequest) returns (stream DiscoverResponse);

    // CheckAvailability checks whether a currency name is available for launch
    rpc CheckAvailability(CheckAvailabilityRequest) returns (CheckAvailabilityResponse);
}

message GetMintsRequest {
    repeated common.v1.SolanaAccountId addresses = 1 [(validate.rules).repeated = {
        min_items: 1
        max_items: 1024 // Arbitrary
    }];
}

message GetMintsResponse {
    Result result = 1;
    enum Result {
        OK        = 0;
        NOT_FOUND = 1;
    }

    map<string, Mint> metadata_by_address = 2;
}

message GetHistoricalMintDataRequest {
    // The mint address to get historical data for
    common.v1.SolanaAccountId address = 1 [(validate.rules).message.required = true];

    // The currency code for the returned market data (e.g., "usd")
    string currency_code = 2 [(validate.rules).string = {
        pattern: "^[a-z]{3,4}$"
    }];

    oneof range {
        option (validate.required) = true;

        PredefinedRange predefined_range = 3;
    }
}

message GetHistoricalMintDataResponse {
    Result result = 1;
    enum Result {
        OK = 0;

        // The requested mint or currency was not found
        NOT_FOUND = 1;

        // No data available for the requested time range
        MISSING_DATA = 2;
    }

    repeated HistoricalMintData data = 2;
}

message StreamLiveMintDataRequest {
    oneof type {
        option (validate.required) = true;

        Request              request = 1;
        common.v1.ClientPong pong    = 2;
    }

    message Request {
        // The set of mints to receive live data against. To update the set of mints,
        // close the current stream and open a new one with the new set.
        repeated common.v1.SolanaAccountId mints = 1 [(validate.rules).repeated = {
            min_items: 1
            max_items: 1024 // Arbitrary
        }];
    }
}

message StreamLiveMintDataResponse {
    oneof type {
        option (validate.required) = true;

        LiveData             data = 1;
        common.v1.ServerPing ping = 2;
    }

    message LiveData {
        oneof type {
            option (validate.required) = true;

            VerifiedCoreMintFiatExchangeRateBatch      core_mint_fiat_exchange_rates     = 1;
            VerifiedLaunchapdCurrencyReserveStateBatch launchpad_currency_reserve_states = 2;
        }
    }
}

message Mint {
    // Token mint address
    common.v1.SolanaAccountId address = 1 [(validate.rules).message.required = true];

    // The number of decimals configured for the mint
    uint32 decimals = 2;

    // Currency name
    string name = 3 [(validate.rules).string = {
        min_len: 1,
        max_len: 32,
    }];

    // Currency ticker symbol
    string symbol = 4 [(validate.rules).string = {
        min_len: 1,
        max_len: 8,
    }];

    // Currency description
    string description = 5 [(validate.rules).string = {
        min_len: 1,
        max_len: 4096,
    }];

    // URL to currency image
    string image_url = 6 [(validate.rules).string = {
        min_len: 1,
        max_len: 1024,
    }];

    // Available when a VM exists for the given mint, and can be used for deriving
    // VM deposit PDAs
    //
    // Note: Only currencies with a VM are useable for payments
    VmMetadata vm_metadata = 7;

    // Available when created by the launchpad via the currency creator program, and
    // can be used for calculating price, market cap, etc. based on the exponential
    // bonding curve
    LaunchpadMetadata launchpad_metadata = 8;

    // Timestamp the currency was created
    google.protobuf.Timestamp created_at = 9 [(validate.rules).timestamp.required = true];

    // Social links for this currency
    repeated SocialLink social_links = 10 [(validate.rules).repeated = {
        min_items: 0
        max_items: 32 // Arbitrary
    }];

    // Bill customization for this currency. Use the default if not provided
    BillCustomization bill_customization = 11;

    // Holder metrics. This is surfaced where needed (e.g. only in the Discover RPC)
    HolderMetrics holder_metrics = 12;
}

message VmMetadata {
    // VM address
    common.v1.SolanaAccountId vm = 1 [(validate.rules).message.required = true];

    // Authority that subsidizes and authorizes all transactions against the VM
    common.v1.SolanaAccountId authority = 2 [(validate.rules).message.required = true];

    // Lock duration of Virtual Timelock Accounts on the VM, currently hardcoded
    // to 21 days
    uint32 lock_duration_in_days = 3 [(validate.rules).uint32.const = 21];

    // VM omnibus address
    common.v1.SolanaAccountId omnibus = 4 [(validate.rules).message.required = true];
}

message LaunchpadMetadata {
    // The address of the currency config
    common.v1.SolanaAccountId currency_config = 1 [(validate.rules).message.required = true];

    // The address of the liquidity pool
    common.v1.SolanaAccountId liquidity_pool = 2 [(validate.rules).message.required = true];

    // The random seed used during currency creation
    common.v1.SolanaAccountId seed = 3 [(validate.rules).message.required = true];

    // The address of the authority for the currency
    common.v1.SolanaAccountId authority = 4 [(validate.rules).message.required = true];

    // The address where this mint's tokens are locked against the liquidity pool
    common.v1.SolanaAccountId mint_vault = 5 [(validate.rules).message.required = true];

    // The address where core mint tokens are locked against the liquidity pool
    common.v1.SolanaAccountId core_mint_vault = 6 [(validate.rules).message.required = true];

    // Current circulating mint token supply in quarks
    uint64 supply_from_bonding = 7;

    // Precent fee for sells in basis points, currently hardcoded to 1%
    uint32 sell_fee_bps = 8 [(validate.rules).uint32.const = 100];

    // The current price in USD
    double price = 9;

    // The current market capitalization in USD
    double market_cap = 10;
}

message HistoricalMintData {
    // Timestamp for this data point
    google.protobuf.Timestamp timestamp = 1 [(validate.rules).timestamp.required = true];

    // Market capitalization at this point in time
    double market_cap = 2;
}

message CoreMintFiatExchangeRate {
    // The currency code for the fiat exchange rate
    string currency_code = 1 [(validate.rules).string = {
        pattern: "^[a-z]{3,4}$"
    }];

    // The exchange rate against the core mint
    double exchange_rate = 2;

    // Timestamp for this data point
    google.protobuf.Timestamp timestamp = 3 [(validate.rules).timestamp.required = true];
}

// CoreMintFiatExchangeRate with a server signature for proof for use in a payment
message VerifiedCoreMintFiatExchangeRate {
    CoreMintFiatExchangeRate exchange_rate = 1 [(validate.rules).message.required = true];

    common.v1.Signature signature = 2 [(validate.rules).message.required = true];
}

message VerifiedCoreMintFiatExchangeRateBatch {
    repeated VerifiedCoreMintFiatExchangeRate exchange_rates = 2  [(validate.rules).repeated = {
        min_items: 1
        max_items: 256 // Arbitrary
    }];
}

message LaunchpadCurrencyReserveState {
    // Launchpad currency mint address
    common.v1.SolanaAccountId mint = 1 [(validate.rules).message.required = true];

    // Current circulating mint token supply in quarks
    uint64 supply_from_bonding = 2;

    // Timestamp for this data point
    google.protobuf.Timestamp timestamp = 3 [(validate.rules).timestamp.required = true];
}

// LaunchpadCurrencyReserveState with a server signature for proof for use in a payment
message VerifiedLaunchpadCurrencyReserveState {
    LaunchpadCurrencyReserveState reserve_state = 1 [(validate.rules).message.required = true];;

    common.v1.Signature signature = 2 [(validate.rules).message.required = true];;
}

message VerifiedLaunchapdCurrencyReserveStateBatch {
    repeated VerifiedLaunchpadCurrencyReserveState reserve_states = 2  [(validate.rules).repeated = {
        min_items: 1
        max_items: 1024 // Arbitrary
    }];
}

message SocialLink {
    oneof type {
        option (validate.required) = true;

        Website  website  = 1;
        X        x        = 2;
        Telegram telegram = 3;
        Discord  discord  = 4;
    }

    message Website {
        string url = 1 [(validate.rules).string = {
            uri: true,
            max_len: 2048,
        }];
    }

    message X {
        string username = 1 [(validate.rules).string = {
            min_len: 1,
            max_len: 15,
            pattern: "^[a-zA-Z0-9_]+$",
        }];
    }

    message Telegram {
        // Telegram username (without the @ prefix)
        string username = 1 [(validate.rules).string = {
            min_len: 1,
            max_len: 32,
            pattern: "^[a-zA-Z0-9_]+$",
        }];
    }

    message Discord {
        // Discord invite code (e.g. "abc123" from discord.gg/abc123)
        string invite_code = 1 [(validate.rules).string = {
            min_len: 1,
            max_len: 32,
            pattern: "^[a-zA-Z0-9]+$",
        }];
    }
}

message BillCustomization {
    // Bill background colors (from top to bottom)
    repeated Color colors = 1 [(validate.rules).repeated = {
        min_items: 2
        max_items: 3
    }];
}

message Color {
    // Hex colour value (e.g. "#19191A")
    string hex = 1 [(validate.rules).string = {
        pattern: "^#[0-9a-fA-F]{6}$"
    }];
}

message HolderMetrics {
    // The current number of holders for a currency
    uint64 current_holders = 1;

    repeated DeltaHolders holder_deltas = 2 [(validate.rules).repeated = {
        min_items: 0
        max_items: 4
    }];

    message DeltaHolders {
        // Predefined range where delta is calculated from
        PredefinedRange range = 1;

        // Net holders within the time range
        int64 delta = 2;
    }
}

message LaunchRequest {
    // The owner account launching the currency
    common.v1.SolanaAccountId owner = 1 [(validate.rules).message.required = true];

    // The signature is of serialize(LaunchRequest) without this field set
    // using the private key of the owner account. This provides an authentication
    // mechanism to the RPC.
    common.v1.Signature signature = 2 [(validate.rules).message.required = true];

    // The name of the currency to launch. Must be printable ASCII with no
    // leading or trailing spaces.
    string name = 3 [(validate.rules).string = {
        min_len: 1,
        max_len: 32,
        // [!-~] = printable ASCII excluding space; [ -~] = printable ASCII including space
        pattern: "^[!-~]([ -~]*[!-~])?$",
    }];

    // The ticker symbol for the currency. Must be printable ASCII with no
    // spaces. If not provided, a default will be generated using the currency
    // name.
    string symbol = 4 [(validate.rules).string = {
        max_len: 8,
        // [!-~] = printable ASCII excluding space
        pattern: "^[!-~]*$",
    }];

    // Optional description
    string description = 5 [(validate.rules).string = {
        max_len: 4096,
    }];

    // Optional bill customization. If not provided, a default will be set.
    BillCustomization bill_customization = 6;

    // The raw image data for the icon. If not provided, a default will be set.
    bytes icon = 7 [(validate.rules).bytes = {
        max_len: 1048576, // 1 MB
    }];

    // Attestation that the name passed moderation
    ModerationAttestation name_moderation_attestation = 8 [(validate.rules).message.required = true];

    // Attestation that the symbol, if provided, passed moderation
    ModerationAttestation symbol_moderation_attestation = 9;

    // Attestation that the descritpion, if provided, passed moderation
    ModerationAttestation description_moderation_attestation = 10;

    // Attestation that the icon image, if provided, passed moderation
    ModerationAttestation icon_moderation_attestation = 11;
}

message LaunchResponse {
    Result result = 1;
    enum Result {
        OK = 0;
        // The launch was denied
        DENIED = 1;
        // A similar currency already exists
        NAME_EXISTS = 2;
        // Provided icon is invalid
        INVALID_ICON = 3;
    }

    // The mint address of the launched currency on success
    common.v1.SolanaAccountId mint = 2;
}

message UpdateIconRequest {
    // The owner account of the currency
    common.v1.SolanaAccountId owner = 1 [(validate.rules).message.required = true];

    // The signature is of serialize(UpdateIconRequest) without this field set
    // using the private key of the owner account. This provides an authentication
    // mechanism to the RPC.
    common.v1.Signature signature = 2 [(validate.rules).message.required = true];

    // The mint address of the currency to update
    common.v1.SolanaAccountId mint = 3 [(validate.rules).message.required = true];

    // The raw image data for the icon
    bytes icon = 4 [(validate.rules).bytes = {
        min_len: 1,
        max_len: 1048576, // 1 MB
    }];

    // Attestation that the icon image passed moderation
    ModerationAttestation moderation_attestation = 5 [(validate.rules).message.required = true];
}

message UpdateIconResponse {
    Result result = 1;
    enum Result {
        OK           = 0;
        NOT_FOUND    = 1;
        DENIED       = 2;
        INVALID_ICON = 3;
    }
}

message UpdateMetadataRequest {
    // The owner account of the currency
    common.v1.SolanaAccountId owner = 1 [(validate.rules).message.required = true];

    // The signature is of serialize(UpdateMetadataRequest) without this field set
    // using the private key of the owner account. This provides an authentication
    // mechanism to the RPC.
    common.v1.Signature signature = 2 [(validate.rules).message.required = true];

    // The mint address of the currency to update
    common.v1.SolanaAccountId mint = 3 [(validate.rules).message.required = true];

    // Updated currency description. If not provided, description is not updated.
    DescriptionUpdate new_description = 4;

    // Updated bill customization. If not provided, bill customization is not updated.
    BillCustomizationUpdate new_bill_customization = 5;

    // Updated social links. This replaces the entire set of social links. If not
    // provided, social links are not updated.
    SocialLinksUpdate new_social_links = 6;

    message DescriptionUpdate {
        string value = 1 [(validate.rules).string = {
            min_len: 1,
            max_len: 4096,
        }];

        // Attestation that the description passed moderation
        ModerationAttestation moderation_attestation = 2 [(validate.rules).message.required = true];
    }

    message BillCustomizationUpdate {
        BillCustomization value = 1 [(validate.rules).message.required = true];
    }

    message SocialLinksUpdate {
        repeated SocialLink value = 1 [(validate.rules).repeated = {
            min_items: 0
            max_items: 32 // Arbitrary
        }];
    }
}

message UpdateMetadataResponse {
    Result result = 1;
    enum Result {
        OK        = 0;
        NOT_FOUND = 1;
        DENIED    = 2;
    }
}

message DiscoverRequest {
    Category category = 1;
    enum Category {
        POPULAR = 0;
        NEW     = 1;
    }
}

message DiscoverResponse {
    Result result = 1;
    enum Result {
        OK        = 0;
        NOT_FOUND = 1;
    }

    repeated Mint mints = 2 [(validate.rules).repeated = {
        min_items: 0
        max_items: 1024 // Arbitrary
    }];
}

message CheckAvailabilityRequest {
    // The currency name to check availability for
    string name = 1 [(validate.rules).string = {
        min_len: 1,
        max_len: 32,
        // [!-~] = printable ASCII excluding space; [ -~] = printable ASCII including space
        pattern: "^[!-~]([ -~]*[!-~])?$",
    }];
}

message CheckAvailabilityResponse {
    Result result = 1;
    enum Result {
        OK = 0;
    }

    // Whether the name is available for use
    bool is_available = 2;
}

enum PredefinedRange {
    ALL_TIME   = 0;
    LAST_DAY   = 1;
    LAST_WEEK  = 2;
    LAST_MONTH = 3;
    LAST_YEAR  = 4;
}

message ModerationAttestation {
    bytes raw_value = 1 [(validate.rules).bytes = {
        min_len: 1,
        max_len: 4096,
    }];
}